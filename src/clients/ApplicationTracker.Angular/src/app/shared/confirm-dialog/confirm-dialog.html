<h2 mat-dialog-title>{{ data.title }}</h2>

<mat-dialog-content>
  <p>{{ data.message }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-raised-button [color]="confirmColor" cdkFocusInitial (click)="confirm()">
    {{ confirmLabel }}
  </button>
</mat-dialog-actions>
