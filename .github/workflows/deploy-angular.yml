name: Deploy Angular Client to Azure Static Web Apps

on:
  push:
    branches:
      - main
    paths:
      - 'src/clients/ApplicationTracker.Angular/**'
      - '.github/workflows/deploy-angular.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Run Tests

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/clients/ApplicationTracker.Angular/package-lock.json

      - name: Install dependencies
        working-directory: src/clients/ApplicationTracker.Angular
        run: npm ci

      - name: Run tests
        working-directory: src/clients/ApplicationTracker.Angular
        run: npm test

  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    needs: test
    runs-on: ubuntu-latest
    name: Deploy

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/clients/ApplicationTracker.Angular/package-lock.json

      - name: Install dependencies
        working-directory: src/clients/ApplicationTracker.Angular
        run: npm ci

      - name: Inject API URL
        working-directory: src/clients/ApplicationTracker.Angular
        run: sed -i "s|API_URL_PLACEHOLDER|${{ secrets.API_URL }}|g" src/environments/environment.prod.ts

      - name: Build
        working-directory: src/clients/ApplicationTracker.Angular
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_MANGO_ROCK_06C415C0F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: './src/clients/ApplicationTracker.Angular'
          output_location: 'dist/ApplicationTracker.Angular'
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job

    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_MANGO_ROCK_06C415C0F }}
          action: 'close'